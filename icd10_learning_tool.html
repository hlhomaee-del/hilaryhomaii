<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICD-10 Interactive Learning Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Literata:ital,opsz,wght@0,7..72,400;0,7..72,500;1,7..72,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F5F0;
    --surface: #FFFFFF;
    --surface2: #F2EFE9;
    --border: rgba(60,55,40,0.12);
    --border-md: rgba(60,55,40,0.22);
    --text: #1A1814;
    --text-2: #5C5750;
    --text-3: #96918A;
    --blue: #1A5FA8;
    --blue-bg: #EAF1FB;
    --blue-text: #0B3D7A;
    --green: #1A7A50;
    --green-bg: #E6F4ED;
    --green-text: #0E5235;
    --amber: #A06010;
    --amber-bg: #FDF3E3;
    --amber-text: #6B3F08;
    --red: #B83232;
    --red-bg: #FDEAEA;
    --red-text: #7A1A1A;
    --purple: #5540C0;
    --purple-bg: #EFECFD;
    --purple-text: #352888;
    --mono: 'DM Mono', monospace;
    --serif: 'Literata', Georgia, serif;
    --radius: 10px;
    --radius-sm: 6px;
  }

  body {
    font-family: var(--serif);
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    line-height: 1.7;
    min-height: 100vh;
  }

  /* ── HEADER ─────────────────────────────────────── */
  header {
    background: var(--text);
    color: #F7F5F0;
    padding: 2rem 2rem 1.75rem;
    border-bottom: 3px solid var(--blue);
  }
  header .eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: rgba(247,245,240,.5);
    margin-bottom: .4rem;
  }
  header h1 {
    font-size: clamp(22px, 4vw, 32px);
    font-weight: 500;
    letter-spacing: -.01em;
    line-height: 1.2;
  }
  header p {
    font-size: 14px;
    color: rgba(247,245,240,.6);
    margin-top: .4rem;
    font-style: italic;
  }

  /* ── LAYOUT ──────────────────────────────────────── */
  main { max-width: 820px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }
  section { margin-bottom: 2.5rem; }
  .section-label {
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .1em;
    color: var(--text-3);
    margin-bottom: .6rem;
  }

  /* ── CARDS ───────────────────────────────────────── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .card-body { padding: 1.25rem 1.5rem; }
  .card-title {
    font-size: 17px;
    font-weight: 500;
    margin-bottom: .4rem;
  }

  /* ── PROGRESS DOTS ───────────────────────────────── */
  .progress-bar { display: flex; gap: 5px; margin-bottom: 1.25rem; }
  .step-dot {
    flex: 1; height: 4px; border-radius: 2px;
    background: var(--border-md); cursor: pointer;
    transition: background .25s;
  }
  .step-dot.active { background: var(--blue); }
  .step-dot.done { background: var(--green); }

  /* ── STEP LABEL ──────────────────────────────────── */
  .step-label {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; color: var(--text-2); margin-bottom: .85rem;
  }
  .step-icon {
    width: 26px; height: 26px; border-radius: 50%;
    background: var(--blue-bg); color: var(--blue-text);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; flex-shrink: 0;
  }

  /* ── BUTTONS ─────────────────────────────────────── */
  button {
    font-family: var(--serif);
    font-size: 14px;
    padding: 8px 18px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border-md);
    background: transparent;
    color: var(--text);
    cursor: pointer;
    transition: background .15s, transform .1s;
  }
  button:hover { background: var(--surface2); }
  button:active { transform: scale(.98); }
  button.primary {
    background: var(--blue); color: #fff; border-color: var(--blue);
  }
  button.primary:hover { background: var(--blue-text); }
  .nav { display: flex; gap: 10px; margin-top: 1rem; align-items: center; }

  /* ── BADGES ──────────────────────────────────────── */
  .badge {
    display: inline-block; font-size: 11px; font-weight: 500;
    font-family: var(--mono); padding: 3px 9px;
    border-radius: 20px; letter-spacing: .03em;
  }
  .badge-blue { background: var(--blue-bg); color: var(--blue-text); }
  .badge-green { background: var(--green-bg); color: var(--green-text); }
  .badge-amber { background: var(--amber-bg); color: var(--amber-text); }
  .badge-purple { background: var(--purple-bg); color: var(--purple-text); }
  .badge-red { background: var(--red-bg); color: var(--red-text); }
  .badge-gray { background: var(--surface2); color: var(--text-2); }

  /* ── NOTE BOXES ──────────────────────────────────── */
  .note-box {
    border-radius: var(--radius-sm);
    padding: .55rem .9rem;
    font-size: 13px;
    margin: .5rem 0;
    line-height: 1.5;
  }
  .note-box.includes { background: var(--green-bg); border-left: 3px solid var(--green); color: var(--green-text); }
  .note-box.excludes1 { background: var(--red-bg); border-left: 3px solid var(--red); color: var(--red-text); }
  .note-box.useadd { background: var(--blue-bg); border-left: 3px solid var(--blue); color: var(--blue-text); }
  .note-box.codefirst { background: var(--purple-bg); border-left: 3px solid var(--purple); color: var(--purple-text); }
  .note-box.tip { background: var(--amber-bg); border-left: 3px solid var(--amber); color: var(--amber-text); }

  /* ── HIGHLIGHT ROWS ──────────────────────────────── */
  .hl-amber { background: var(--amber-bg); border-left: 3px solid var(--amber); padding-left: 8px; margin-left: -8px; }
  .hl-blue { background: var(--blue-bg); border-left: 3px solid var(--blue); padding-left: 8px; margin-left: -8px; }

  /* ── INDEX PAGE ──────────────────────────────────── */
  .index-main { font-weight: 500; font-size: 15px; margin: .5rem 0 .25rem; }
  .sub1 { padding-left: 1.5rem; font-size: 13.5px; color: var(--text-2); }
  .sub2 { padding-left: 3rem; font-size: 13.5px; color: var(--text-2); }
  .code-ref { font-family: var(--mono); color: var(--blue); font-weight: 500; font-size: 13px; }
  .see-ref { font-style: italic; color: var(--text-3); font-size: 13px; }

  /* ── TABULAR LIST ────────────────────────────────── */
  .code-row { display: flex; align-items: baseline; gap: 10px; padding: 3px 0; }
  .code-row .cod { font-family: var(--mono); font-size: 13.5px; font-weight: 500; color: var(--blue); min-width: 72px; }
  .code-row.selected { background: var(--blue-bg); border-left: 3px solid var(--blue); padding-left: 8px; margin-left: -8px; border-radius: 0; }

  /* ── CODE ANATOMY ────────────────────────────────── */
  .code-display {
    font-family: var(--mono); font-size: 26px; font-weight: 500;
    letter-spacing: .1em; padding: .6rem 1.2rem;
    background: var(--surface2); border-radius: var(--radius-sm);
    display: inline-block; margin: .75rem 0;
    border: 1px solid var(--border);
  }
  .code-breakdown { display: flex; gap: 4px; margin: .5rem 0 1rem; flex-wrap: wrap; }
  .code-part { text-align: center; }
  .code-char {
    font-family: var(--mono); font-size: 20px; font-weight: 500;
    width: 34px; height: 38px; display: flex;
    align-items: center; justify-content: center; border-radius: 6px;
  }
  .code-char-label { font-size: 10px; margin-top: 3px; font-weight: 500; font-family: var(--mono); }
  .char-cat { background: var(--blue-bg); color: var(--blue-text); }
  .char-etio { background: var(--purple-bg); color: var(--purple-text); }
  .char-body { background: var(--green-bg); color: var(--green-text); }
  .char-sev { background: var(--amber-bg); color: var(--amber-text); }
  .char-ext { background: var(--red-bg); color: var(--red-text); }
  .char-dot { background: var(--surface2); color: var(--text-3); }

  /* ── QUIZ ────────────────────────────────────────── */
  .quiz-option {
    width: 100%; text-align: left; margin-bottom: 7px;
    padding: 10px 14px; font-family: var(--serif);
    font-size: 14px; border-radius: var(--radius-sm);
    border: 1px solid var(--border-md);
    background: transparent; color: var(--text);
    cursor: pointer; transition: background .15s, border-color .15s;
    line-height: 1.5;
  }
  .quiz-option:hover:not(:disabled) { background: var(--surface2); }
  .quiz-option.correct { border-color: var(--green); background: var(--green-bg); color: var(--green-text); }
  .quiz-option.wrong { border-color: var(--red); background: var(--red-bg); color: var(--red-text); }
  .feedback {
    font-size: 13.5px; padding: 9px 13px;
    border-radius: var(--radius-sm); margin-top: 8px; line-height: 1.55;
  }
  .feedback.correct { background: var(--green-bg); color: var(--green-text); }
  .feedback.wrong { background: var(--red-bg); color: var(--red-text); }

  /* ── DRAG DROP ───────────────────────────────────── */
  .drag-zone {
    min-height: 46px; border: 1.5px dashed var(--border-md);
    border-radius: var(--radius-sm); display: flex;
    align-items: center; flex: 1; padding: 6px 10px;
    gap: 6px; flex-wrap: wrap; transition: border-color .2s, background .2s;
  }
  .drag-zone.over { border-color: var(--blue); background: var(--blue-bg); }
  .drag-tile {
    font-family: var(--mono); font-size: 12.5px; font-weight: 500;
    padding: 5px 11px; border-radius: var(--radius-sm);
    cursor: grab; user-select: none;
    border: 1px solid var(--border-md);
    background: var(--surface); color: var(--text);
    transition: transform .1s; line-height: 1.4;
  }
  .drag-tile:active { cursor: grabbing; transform: scale(1.04); }
  .drop-row { display: flex; align-items: center; gap: 10px; margin: 5px 0; }
  .drop-label {
    min-width: 64px; font-family: var(--mono); font-size: 11px;
    background: var(--blue-bg); color: var(--blue-text);
    border-radius: var(--radius-sm); padding: 4px 8px;
    text-align: center; font-weight: 500;
  }

  /* ── STEPS LIST ──────────────────────────────────── */
  .steps-list { list-style: none; counter-reset: steps; }
  .steps-list li {
    counter-increment: steps; display: flex;
    gap: 12px; margin-bottom: .9rem;
    font-size: 14.5px; color: var(--text-2); line-height: 1.6;
  }
  .steps-list li::before {
    content: counter(steps);
    min-width: 24px; height: 24px; border-radius: 50%;
    background: var(--blue-bg); color: var(--blue-text);
    font-size: 12px; font-weight: 500; font-family: var(--mono);
    display: flex; align-items: center; justify-content: center;
    margin-top: 2px; flex-shrink: 0;
  }

  /* ── BOOK TABS ───────────────────────────────────── */
  .tab-row { display: flex; gap: 0; }
  .tab-btn {
    flex: 1; padding: 9px 6px; font-family: var(--mono);
    font-size: 12px; border: 1px solid var(--border-md);
    background: var(--surface2); color: var(--text-2);
    cursor: pointer; transition: background .15s;
    border-radius: 0; letter-spacing: .02em;
  }
  .tab-btn:first-child { border-radius: var(--radius-sm) 0 0 0; }
  .tab-btn:last-child { border-radius: 0 var(--radius-sm) 0 0; }
  .tab-btn.active {
    background: var(--surface); color: var(--text);
    border-bottom-color: var(--surface); font-weight: 500;
  }
  .book-wrap {
    border: 1px solid var(--border-md);
    border-top: none;
    border-radius: 0 0 var(--radius) var(--radius);
    background: var(--surface);
  }
  .page-header {
    font-family: var(--mono); font-size: 11px; font-weight: 500;
    color: var(--text-3); letter-spacing: .07em; text-transform: uppercase;
    padding: 8px 1.25rem; background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }
  .page { padding: 1rem 1.25rem; }

  /* ── WALKTHROUGH STEPS ───────────────────────────── */
  .walk-step {
    border: 1px solid var(--border);
    border-radius: var(--radius-sm); margin-bottom: .65rem; overflow: hidden;
  }
  .walk-step-header {
    padding: .5rem .9rem; background: var(--surface2);
    font-size: 12.5px; font-weight: 500; color: var(--text-2);
    display: flex; align-items: center; gap: 8px;
    font-family: var(--mono);
  }
  .walk-step-body { padding: .65rem .9rem; font-size: 13.5px; }
  .num-circle {
    width: 22px; height: 22px; border-radius: 50%;
    display: inline-flex; align-items: center;
    justify-content: center; font-size: 11px; font-weight: 500;
    flex-shrink: 0; font-family: var(--mono);
  }
  .nc-blue { background: var(--blue-bg); color: var(--blue-text); }
  .nc-amber { background: var(--amber-bg); color: var(--amber-text); }
  .nc-green { background: var(--green-bg); color: var(--green-text); }

  /* ── BOOK GRAPHIC ────────────────────────────────── */
  .book-graphic { display: flex; gap: 10px; align-items: stretch; margin: 1rem 0; }
  .book-section {
    flex: 1; border-radius: var(--radius-sm);
    padding: .75rem; text-align: center;
  }
  .book-section .sec-icon { font-size: 22px; margin-bottom: 4px; }
  .book-section .sec-label { font-size: 13px; font-weight: 500; }
  .book-section .sec-desc { font-size: 11.5px; margin-top: 3px; opacity: .8; }

  /* ── SCORE ───────────────────────────────────────── */
  .score-ring { font-size: 42px; font-weight: 500; text-align: center; color: var(--blue); margin: .5rem 0; font-family: var(--mono); }
  .score-stars { font-size: 28px; text-align: center; margin: .5rem 0; }

  /* ── DIVIDER ─────────────────────────────────────── */
  .divider { border: none; border-top: 1px solid var(--border); margin: .65rem 0; }

  /* ── HIGHLIGHT BOX ───────────────────────────────── */
  .highlight-box {
    border-left: 3px solid var(--blue);
    padding: .5rem 1rem; background: var(--surface2);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    margin: .75rem 0; font-size: 14px; color: var(--text-2);
    font-style: italic;
  }

  /* ── SECTION DIVIDER ─────────────────────────────── */
  .section-divider {
    text-align: center; position: relative; margin: 2.5rem 0 2rem;
  }
  .section-divider::before {
    content: ''; position: absolute; top: 50%; left: 0; right: 0;
    height: 1px; background: var(--border-md);
  }
  .section-divider span {
    position: relative; background: var(--bg);
    padding: 0 1rem; font-family: var(--mono);
    font-size: 12px; color: var(--text-3); letter-spacing: .08em;
    text-transform: uppercase;
  }

  /* ── RESPONSIVE ──────────────────────────────────── */
  @media (max-width: 520px) {
    .book-graphic { flex-direction: column; }
    .tab-btn { font-size: 11px; padding: 8px 4px; }
    header { padding: 1.5rem 1.25rem; }
    .code-display { font-size: 20px; }
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">Medical Coding Education</div>
  <h1>ICD-10 Interactive Learning Tool</h1>
  <p>Step-by-step training for diagnosis coding — Alphabetic Index &amp; Tabular List</p>
</header>

<main>

  <!-- ══ PART 1: STEP-BY-STEP GUIDE ════════════════════ -->
  <section>
    <div class="section-label">Part 1 — Core concepts &amp; activities</div>
    <div class="card">
      <div class="card-body">
        <div class="progress-bar" id="prog1"></div>
        <div class="step-label" id="step-label1"></div>
        <div id="step-content1"></div>
      </div>
    </div>
  </section>

  <div class="section-divider"><span>Book simulation</span></div>

  <!-- ══ PART 2: BOOK SIMULATION ════════════════════════ -->
  <section>
    <div class="section-label">Part 2 — See exactly how the book looks</div>
    <div class="tab-row">
      <button class="tab-btn active" id="tab-idx" onclick="showTab('idx')">Vol 2 — Alphabetic index</button>
      <button class="tab-btn" id="tab-tab" onclick="showTab('tab')">Vol 1 — Tabular list</button>
      <button class="tab-btn" id="tab-walk" onclick="showTab('walk')">Full walkthrough</button>
    </div>
    <div class="book-wrap">
      <div id="pane-idx"></div>
      <div id="pane-tab" style="display:none"></div>
      <div id="pane-walk" style="display:none"></div>
    </div>
  </section>

</main>

<script>
/* ══════════════════════════════════════════════════════
   PART 1 — STEP-BY-STEP INTERACTIVE GUIDE
══════════════════════════════════════════════════════ */
const STEPS = [
  { label: 'What is ICD-10?',      icon: '📘' },
  { label: 'The two volumes',      icon: '📚' },
  { label: 'Anatomy of a code',    icon: '🔍' },
  { label: 'Alphabetic index',     icon: '🔤' },
  { label: 'Tabular list',         icon: '📋' },
  { label: 'Build a code',         icon: '🛠' },
  { label: 'Sort the steps',       icon: '🎯' },
  { label: 'Quick quiz',           icon: '✏' },
  { label: 'Practice case',        icon: '🩺' },
  { label: 'You did it!',          icon: '🏆' },
];

let current = 0;
let quizAnswered = Array(4).fill(null);
let practiceAnswered = false;

const CORRECT_ORDER = [
  'Identify the main term',
  'Look in Alphabetic index',
  'Check cross-references',
  'Find code in Tabular list',
  'Verify all characters',
  'Assign the final code',
];
let dragOrder = shuffle([...CORRECT_ORDER]);

const QUIZ = [
  {
    q: 'Which volume do you consult FIRST when looking up a diagnosis?',
    opts: ['Tabular list (Vol 1)','Alphabetic index (Vol 2)','Vol 3 — procedure codes','The ICD-9 book'],
    ans: 1,
    exp: 'Always start with the Alphabetic index to find candidate codes, then verify in the Tabular list. Never code directly from the index!'
  },
  {
    q: 'In the code J18.9, what does the letter "J" represent?',
    opts: ['Severity','Body system / chapter','Extension character','Etiology'],
    ans: 1,
    exp: '"J" is the category letter — it tells you the body system. J = Diseases of the respiratory system.'
  },
  {
    q: 'A code shows "7th character required." What happens if you omit it?',
    opts: ['The claim processes normally','It defaults to "A" automatically','The claim is invalid / rejected','The coder may leave it blank'],
    ans: 2,
    exp: 'If a 7th character is required, it must be present. Claims missing required characters will be rejected by payers.'
  },
  {
    q: 'What does Excludes1 mean in the Tabular list?',
    opts: ['Code both conditions together','The two codes can never be coded together','Code the secondary condition only','It is an optional exclusion note'],
    ans: 1,
    exp: 'Excludes1 means the two conditions cannot be coded together on the same claim — they are mutually exclusive by definition.'
  },
];

function shuffle(arr) { return arr.sort(() => Math.random() - .5); }

function renderPart1() {
  const prog = document.getElementById('prog1');
  prog.innerHTML = STEPS.map((s, i) =>
    `<div class="step-dot ${i < current ? 'done' : i === current ? 'active' : ''}"
      onclick="goTo(${i})" title="${s.label}" style="cursor:pointer"></div>`
  ).join('');

  const lbl = document.getElementById('step-label1');
  lbl.innerHTML = `<span class="step-icon">${STEPS[current].icon}</span>
    <span>Step ${current + 1} of ${STEPS.length} — <strong>${STEPS[current].label}</strong></span>`;

  const content = document.getElementById('step-content1');
  content.innerHTML = buildStepContent(current);
  attachDragEvents();
}

function buildStepContent(idx) {
  const id = STEPS[idx].label;
  let body = '';
  let nav = '';

  const backBtn = idx > 0 ? `<button onclick="goTo(${idx-1})">← Back</button>` : '';
  const nextBtn = `<button class="primary" onclick="goTo(${idx+1})" style="margin-left:auto">Next step →</button>`;

  if (id === 'What is ICD-10?') {
    body = `
      <p style="margin-bottom:.75rem">ICD-10 stands for the <strong>International Classification of Diseases, 10th Revision</strong>. It's the universal language coders use to translate medical diagnoses into alphanumeric codes that insurers, hospitals, and governments understand.</p>
      <div class="book-graphic">
        <div class="book-section" style="background:var(--blue-bg);color:var(--blue-text)">
          <div class="sec-icon">📋</div>
          <div class="sec-label">Diagnoses</div>
          <div class="sec-desc">ICD-10-CM<br>(Clinical Modification)</div>
        </div>
        <div class="book-section" style="background:var(--purple-bg);color:var(--purple-text)">
          <div class="sec-icon">🔧</div>
          <div class="sec-label">Procedures</div>
          <div class="sec-desc">ICD-10-PCS<br>(Proc. Coding Sys.)</div>
        </div>
        <div class="book-section" style="background:var(--green-bg);color:var(--green-text)">
          <div class="sec-icon">🌍</div>
          <div class="sec-label">Used in</div>
          <div class="sec-desc">30+ countries<br>US adopted 2015</div>
        </div>
      </div>
      <div class="highlight-box">Think of ICD-10 as a <em>universal translator</em> — every disease, injury, or condition has its own unique address code.</div>`;
    nav = `<div class="nav">${backBtn}${nextBtn}</div>`;
  }

  else if (id === 'The two volumes') {
    body = `
      <p style="margin-bottom:1rem">The ICD-10-CM book has two major sections you'll flip between every time you code.</p>
      <div class="card" style="margin-bottom:.75rem;border-left:3px solid var(--blue);border-radius:0 var(--radius-sm) var(--radius-sm) 0">
        <div class="card-body" style="padding:.85rem 1rem">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">
            <span class="badge badge-blue">Volume 1</span>
            <strong>Tabular List</strong>
          </div>

function goTo(i) {
  if (i < 0 || i >= STEPS.length) return;
  current = i;
  renderPart1();
}

function answerQuiz(qi, oi) {
  quizAnswered[qi] = oi;
  renderPart1();
}

function answerPractice() {
  practiceAnswered = true;
  renderPart1();
}

/* ─── Drag & Drop ─── */
function attachDragEvents() {
  document.querySelectorAll('.drag-tile').forEach(tile => {
    tile.addEventListener('dragstart', e => {
      e.dataTransfer.setData('text/plain', tile.dataset.val);
    });
  });
}

function dropOn(ev, slotIdx) {
  ev.preventDefault();
  const val = ev.dataTransfer.getData('text/plain');
  const slot = document.getElementById(`slot-${slotIdx}`);
  slot.classList.remove('over');
  const existing = document.querySelector(`.drag-tile[data-val="${val}"]`);
  if (existing) existing.remove();
  const prev = slot.querySelector('.drag-tile');
  if (prev) document.getElementById('drag-tiles').appendChild(prev);
  const ph = document.getElementById(`slot-ph-${slotIdx}`);
  if (ph) ph.style.display = 'none';
  const newTile = document.createElement('div');
  newTile.className = 'drag-tile';
  newTile.draggable = true;
  newTile.dataset.val = val;
  newTile.textContent = val;
  newTile.addEventListener('dragstart', e => e.dataTransfer.setData('text/plain', val));
  slot.appendChild(newTile);
}

function checkDrag() {
  let correct = 0;
  CORRECT_ORDER.forEach((step, i) => {
    const tile = document.querySelector(`#slot-${i} .drag-tile`);
    if (tile && tile.dataset.val === step) correct++;
  });
  const fb = document.getElementById('drag-feedback');
  if (correct === CORRECT_ORDER.length) {
    fb.innerHTML = `<div class="feedback correct">Perfect! All 6 steps in the correct order.</div>`;
  } else {
    fb.innerHTML = `<div class="feedback wrong">${correct} of 6 correct. Correct order: ${CORRECT_ORDER.map((s,i)=>`${i+1}. ${s}`).join(' → ')}</div>`;
  }
}

function resetDrag() {
  dragOrder = shuffle([...CORRECT_ORDER]);
  renderPart1();
}

          <div style="font-size:12.5px;background:var(--green-bg);border-radius:var(--radius-sm);padding:5px 10px;color:var(--green-text)">J18 category: no "Code first" or "Use additional" instruction</div>
          <div style="font-size:12.5px;background:var(--green-bg);border-radius:var(--radius-sm);padding:5px 10px;color:var(--green-text)">J18.1 entry: valid 5-character code, no further characters required</div>
        </div>`},
        {n:'5',nc:'nc-green',hdr:'Confirm specificity',body:`<span style="color:var(--text-2)">J18.1 matches the documentation. "Right lower lobe" — no separate laterality character exists for pneumonia codes, so this level of detail is not separately codeable.</span>`},
        {n:'6',nc:'nc-green',hdr:'Assign the final code',body:`<div style="text-align:center;padding:.75rem 0">
          <div style="font-family:var(--mono);font-size:32px;font-weight:500;color:var(--blue);letter-spacing:.1em">J18.1</div>
          <div style="font-size:13px;color:var(--text-2);margin-top:4px">Lobar pneumonia, unspecified organism</div>
          <div style="margin-top:.65rem;display:flex;gap:7px;flex-wrap:wrap;justify-content:center">
            <span style="background:var(--green-bg);color:var(--green-text);border-radius:20px;padding:3px 12px;font-size:12px;font-weight:500;font-family:var(--mono)">Valid code</span>
            <span style="background:var(--blue-bg);color:var(--blue-text);border-radius:20px;padding:3px 12px;font-size:12px;font-weight:500;font-family:var(--mono)">5 characters — complete</span>
            <span style="background:var(--green-bg);color:var(--green-text);border-radius:20px;padding:3px 12px;font-size:12px;font-weight:500;font-family:var(--mono)">No extensions required</span>
          </div>
        </div>`},
      ].map(s=>`
        <div class="walk-step">
          <div class="walk-step-header"><span class="num-circle ${s.nc}">${s.n}</span>${s.hdr}</div>
          <div class="walk-step-body">${s.body}</div>
        </div>`).join('')}
    </div>`;
}

function showTab(t) {
  ['idx','tab','walk'].forEach(id => {
    document.getElementById('pane-'+id).style.display = id===t ? 'block' : 'none';
    document.getElementById('tab-'+id).classList.toggle('active', id===t);
  });
}

/* ── Init ── */
document.getElementById('pane-idx').innerHTML  = buildIndexPane();
document.getElementById('pane-tab').innerHTML  = buildTabularPane();
document.getElementById('pane-walk').innerHTML = buildWalkPane();
renderPart1();
</script>
</body>
</html>
